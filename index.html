<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kupon-niespodzianka</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f9d976, #f39f86);
      font-family: Arial, sans-serif;
    }

    .wrap {
      perspective: 1200px;
    }

    .coupon {
      width: 360px;
      height: 220px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
      cursor: pointer;
    }

    .coupon.flipped {
      transform: rotateY(180deg);
    }

    .side {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    }

    .front {
      background: linear-gradient(135deg, #ffffff, #ffe6a7);
      border: 3px dashed #c89b2c;
      color: #6b4e00;
    }

    .back {
      background: linear-gradient(135deg, #2b5876, #4e4376);
      color: #fff;
      transform: rotateY(180deg);
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.95;
    }

    .reward {
      font-size: 26px;
      font-weight: 700;
      margin: 10px 0;
    }

    .hint {
      margin-top: 16px;
      font-size: 14px;
      opacity: 0.8;
    }

    .stamp {
      margin-top: 14px;
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="coupon" id="coupon">
      <div class="side front">
        <div class="title">Kupon-niespodzianka</div>
        <div class="subtitle">Kliknij w kupon, żeby odkryć swoją nagrodę.</div>
        <div class="hint">Czeka coś wyjątkowego ✨</div>
      </div>

      <div class="side back">
        <div class="title">Twoja nagroda</div>
        <div class="reward">Bon na wspólnie spędzony dzień</div>
        <div class="subtitle">Tak jak masz ochotę — bez planu, bez pośpiechu, po prostu razem.</div>
        <div class="stamp">do zrealizowania w dowolnym terminie</div>
      </div>
    </div>
  </div>

  <script>
    const coupon = document.getElementById('coupon');
    coupon.addEventListener('click', () => {
      coupon.classList.toggle('flipped');
    });
  </script>
</body>
</html>
